---
- name: Configure MySQL using Ansible Galaxy Role
  hosts: mysql
  become: true

  vars:
    mysql_repo_url: "https://repo.mysql.com/mysql80-community-release-el9.rpm"
    mysql_repo_path: "/tmp/mysql80-community-release.rpm"
    mysql_gpg_key: "https://repo.mysql.com/RPM-GPG-KEY-mysql-2023"

  pre_tasks:
    - name: Install required dependencies
      yum:
        name:
          - python3-pip
          - shadow-utils
        state: present

    - name: Import MySQL GPG key
      rpm_key:
        state: present
        key: "{{ mysql_gpg_key }}"

    - name: Download MySQL repo using curl
      shell: |
        curl -L "{{ mysql_repo_url }}" -o "{{ mysql_repo_path }}"
      args:
        creates: "{{ mysql_repo_path }}"

    - name: Install MySQL 8 repo
      yum:
        name: "{{ mysql_repo_path }}"
        state: present
        disable_gpg_check: yes

    - name: Install PyMySQL (required for ansible mysql modules)
      pip:
        name: pymysql
        state: present
        executable: pip3

  roles:
    - role: geerlingguy.mysql
    - role: mysql_petclinic
