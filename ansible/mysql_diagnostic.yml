---
- name: MySQL Diagnostic and Health Check
  hosts: mysql
  become: yes
  gather_facts: yes
  
  vars:
    mysql_root_password: "{{ mysql_root_password | default('') }}"
  
  tasks:
    - name: "============================================"
      debug:
        msg: "MYSQL DIAGNOSTIC REPORT"
    
    # ========================================
    # SYSTEM INFORMATION
    # ========================================
    - name: "=== System Information ==="
      debug:
        msg: "Gathering system information..."
    
    - name: Check OS and version
      debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
    
    - name: Check available memory
      debug:
        msg: "Memory: {{ ansible_memtotal_mb }} MB"
    
    - name: Check disk space
      shell: df -h /var/lib/mysql
      register: disk_space
      changed_when: false
    
    - name: Display disk space
      debug:
        msg: "{{ disk_space.stdout_lines }}"
    
    # ========================================
    # MYSQL INSTALLATION CHECK
    # ========================================
    - name: "=== MySQL Installation Check ==="
      debug:
        msg: "Checking MySQL installation..."
    
    - name: Check if MySQL is installed
      shell: which mysqld
      register: mysql_installed
      failed_when: false
      changed_when: false
    
    - name: Display MySQL installation status
      debug:
        msg: "{{ 'MySQL is installed at: ' + mysql_installed.stdout if mysql_installed.rc == 0 else 'MySQL is NOT installed' }}"
    
    - name: Check MySQL package version
      shell: rpm -qa | grep mysql-server || yum list installed mysql-server
      register: mysql_package
      failed_when: false
      changed_when: false
    
    - name: Display MySQL package
      debug:
        msg: "{{ mysql_package.stdout_lines | default(['No MySQL package found']) }}"
    
    # ========================================
    # MYSQL SERVICE STATUS
    # ========================================
    - name: "=== MySQL Service Status ==="
      debug:
        msg: "Checking MySQL service..."
    
    - name: Check MySQL service status
      systemd:
        name: mysqld
      register: mysql_service
      failed_when: false
    
    - name: Display service status
      debug:
        msg: |
          Service: {{ 'Running' if mysql_service.status.ActiveState == 'active' else mysql_service.status.ActiveState | default('Unknown') }}
          Enabled: {{ 'Yes' if mysql_service.status.UnitFileState == 'enabled' else 'No' }}
    
    - name: Check MySQL process
      shell: ps aux | grep mysqld | grep -v grep
      register: mysql_process
      failed_when: false
      changed_when: false
    
    - name: Display MySQL processes
      debug:
        msg: "{{ mysql_process.stdout_lines if mysql_process.rc == 0 else ['No MySQL process running'] }}"
    
    - name: Check MySQL port
      shell: netstat -tuln | grep 3306 || ss -tuln | grep 3306
      register: mysql_port
      failed_when: false
      changed_when: false
    
    - name: Display port status
      debug:
        msg: "{{ mysql_port.stdout_lines if mysql_port.rc == 0 else ['Port 3306 not listening'] }}"
    
    # ========================================
    # MYSQL CONFIGURATION
    # ========================================
    - name: "=== MySQL Configuration ==="
      debug:
        msg: "Checking MySQL configuration..."
    
    - name: Check my.cnf location
      shell: mysql --help | grep "Default options" -A 1
      register: mycnf_location
      failed_when: false
      changed_when: false
    
    - name: Display my.cnf location
      debug:
        msg: "{{ mycnf_location.stdout_lines | default(['my.cnf not found']) }}"
    
    - name: Read my.cnf
      shell: cat /etc/my.cnf
      register: mycnf_content
      failed_when: false
      changed_when: false
    
    - name: Display my.cnf content
      debug:
        msg: "{{ mycnf_content.stdout_lines if mycnf_content.rc == 0 else ['Cannot read /etc/my.cnf'] }}"
    
    # ========================================
    # MYSQL ERROR LOG
    # ========================================
    - name: "=== MySQL Error Log ==="
      debug:
        msg: "Checking error logs..."
    
    - name: Check error log location
      shell: ls -la /var/log/mysqld.log /var/log/mysql/error.log 2>/dev/null | head -1
      register: error_log_location
      failed_when: false
      changed_when: false
    
    - name: Display error log location
      debug:
        msg: "{{ error_log_location.stdout if error_log_location.rc == 0 else 'Error log not found' }}"
    
    - name: Get last 30 lines of error log
      shell: tail -30 /var/log/mysqld.log 2>/dev/null || tail -30 /var/log/mysql/error.log 2>/dev/null || echo "Cannot read error log"
      register: error_log
      failed_when: false
      changed_when: false
    
    - name: Display recent errors
      debug:
        msg: "{{ error_log.stdout_lines }}"
    
    - name: Check for critical errors
      shell: |
        grep -i "error\|fatal\|crash" /var/log/mysqld.log 2>/dev/null | tail -10 || echo "No critical errors in log"
      register: critical_errors
      failed_when: false
      changed_when: false
    
    - name: Display critical errors
      debug:
        msg: "{{ critical_errors.stdout_lines }}"
    
    # ========================================
    # MYSQL CONNECTIVITY
    # ========================================
    - name: "=== MySQL Connectivity ==="
      debug:
        msg: "Testing MySQL connectivity..."
    
    - name: Test connection without password
      shell: mysql -uroot -e "SELECT 1" 2>&1
      register: no_password_test
      failed_when: false
      changed_when: false
    
    - name: Display no-password test result
      debug:
        msg: "{{ 'Root has no password (SECURITY RISK!)' if no_password_test.rc == 0 else 'Root password is set (good)' }}"
    
    - name: Test connection with provided password
      shell: mysql -uroot -p'{{ mysql_root_password }}' -e "SELECT 1" 2>&1
      register: password_test
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display password test result
      debug:
        msg: "{{ 'Root password works!' if (password_test.rc == 0 and password_test is not skipped) else 'Root password failed or not tested' }}"
      when: mysql_root_password | length > 0
    
    - name: Get temporary password from log
      shell: "grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -1"
      register: temp_password
      failed_when: false
      changed_when: false
    
    - name: Display temporary password status
      debug:
        msg: "{{ 'Temporary password found in log (first-time setup needed)' if temp_password.stdout else 'No temporary password in log' }}"
    
    # ========================================
    # DATABASE INFORMATION
    # ========================================
    - name: "=== Database Information ==="
      debug:
        msg: "Checking databases..."
    
    - name: List databases
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SHOW DATABASES" -N -B 2>/dev/null || echo "Cannot access databases"
      register: databases
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display databases
      debug:
        msg: "{{ databases.stdout_lines if (databases.rc == 0 and databases is not skipped) else ['Cannot list databases'] }}"
      when: mysql_root_password | length > 0
    
    - name: Check for Petclinic databases
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SHOW DATABASES LIKE 'petclinic_%'" -N -B 2>/dev/null
      register: petclinic_dbs
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display Petclinic databases
      debug:
        msg: "{{ petclinic_dbs.stdout_lines if (petclinic_dbs.rc == 0 and petclinic_dbs is not skipped and petclinic_dbs.stdout_lines | length > 0) else ['No Petclinic databases found'] }}"
      when: mysql_root_password | length > 0
    
    # ========================================
    # USER INFORMATION
    # ========================================
    - name: "=== User Information ==="
      debug:
        msg: "Checking MySQL users..."
    
    - name: List MySQL users
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SELECT User, Host FROM mysql.user" 2>/dev/null
      register: mysql_users
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display MySQL users
      debug:
        msg: "{{ mysql_users.stdout_lines if (mysql_users.rc == 0 and mysql_users is not skipped) else ['Cannot list users'] }}"
      when: mysql_root_password | length > 0
    
    # ========================================
    # PASSWORD POLICY
    # ========================================
    - name: "=== Password Policy ==="
      debug:
        msg: "Checking password validation policy..."
    
    - name: Check password validation components
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SELECT * FROM mysql.component" 2>/dev/null || echo "Cannot check components"
      register: components
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display components
      debug:
        msg: "{{ components.stdout_lines if (components.rc == 0 and components is not skipped) else ['Cannot check components'] }}"
      when: mysql_root_password | length > 0
    
    - name: Check password validation variables
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SHOW VARIABLES LIKE 'validate_password%'" 2>/dev/null || echo "Password validation not enabled"
      register: password_vars
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display password policy
      debug:
        msg: "{{ password_vars.stdout_lines if (password_vars.rc == 0 and password_vars is not skipped) else ['Password validation variables not available'] }}"
      when: mysql_root_password | length > 0
    
    # ========================================
    # NETWORK CONFIGURATION
    # ========================================
    - name: "=== Network Configuration ==="
      debug:
        msg: "Checking network settings..."
    
    - name: Check bind address
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SHOW VARIABLES LIKE 'bind_address'" 2>/dev/null || grep bind-address /etc/my.cnf
      register: bind_address
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display bind address
      debug:
        msg: "{{ bind_address.stdout_lines if bind_address.rc == 0 else ['Cannot determine bind address'] }}"
      when: mysql_root_password | length > 0
    
    - name: Check max connections
      shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "SHOW VARIABLES LIKE 'max_connections'" 2>/dev/null
      register: max_conn
      failed_when: false
      changed_when: false
      when: mysql_root_password | length > 0
      no_log: true
    
    - name: Display max connections
      debug:
        msg: "{{ max_conn.stdout_lines if (max_conn.rc == 0 and max_conn is not skipped) else ['Cannot check max connections'] }}"
      when: mysql_root_password | length > 0
    
    # ========================================
    # FIREWALL STATUS
    # ========================================
    - name: "=== Firewall Status ==="
      debug:
        msg: "Checking firewall settings..."
    
    - name: Check firewalld status
      shell: systemctl status firewalld
      register: firewalld_status
      failed_when: false
      changed_when: false
    
    - name: Display firewalld status
      debug:
        msg: "{{ 'Firewalld is ' + firewalld_status.stdout_lines[2] if firewalld_status.rc == 0 else 'Firewalld not running or not installed' }}"
    
    - name: Check firewall rules for MySQL
      shell: firewall-cmd --list-all 2>/dev/null | grep -A 10 services || iptables -L -n | grep 3306 || echo "Cannot check firewall rules"
      register: firewall_rules
      failed_when: false
      changed_when: false
    
    - name: Display firewall rules
      debug:
        msg: "{{ firewall_rules.stdout_lines }}"
    
    # ========================================
    # RECOMMENDATIONS
    # ========================================
    - name: "=== Recommendations ==="
      debug:
        msg: |
          ============================================
          DIAGNOSTIC COMPLETE
          ============================================
          
          Quick Fixes:
          
          1. If MySQL is not running:
             sudo systemctl start mysqld
          
          2. If root password doesn't work:
             Run reset_mysql.yml playbook
          
          3. If password policy is blocking:
             Update Jenkins credentials with stronger password
             Format: Uppercase + Lowercase + Number + Special
             Example: Petclinic2025!
          
          4. If databases don't exist:
             Run mysql_setup.yml after fixing password
          
          5. If remote connection fails:
             Check bind-address in /etc/my.cnf (should be 0.0.0.0)
             Check AWS Security Group allows port 3306
          
          ============================================
