---
- name: Copy SQL Schema files to remote host for execution
  copy:
    src: "{{ role_path }}/files/{{ item }}-schema.sql"
    dest: "/tmp/petclinic/{{ item }}-schema.sql"
    owner: root
    group: root
    mode: '0644'
  loop:
    - customers
    - visits
    - vets

- name: Load database schema
  shell: |
    mysql -u root -p"{{ mysql_root_password }}" {{ mysql_database_name }} < /tmp/petclinic/{{ item }}-schema.sql
  loop:
    - customers
    - visits
    - vets
  changed_when: false
