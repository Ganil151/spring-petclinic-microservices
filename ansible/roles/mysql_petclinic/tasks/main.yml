---
# MySQL Petclinic Database Setup Tasks

- name: Verify MySQL root password is set
  shell: mysql -uroot -p"{{ mysql_root_password }}" -e "SELECT 1;" 2>/dev/null
  register: root_auth_check
  changed_when: false
  failed_when: root_auth_check.rc != 0

- name: Ensure MySQL databases exist
  shell: |
    mysql -uroot -p"{{ mysql_root_password }}" -e "CREATE DATABASE IF NOT EXISTS {{ item }};"
  loop: "{{ petclinic_databases }}"
  changed_when: false

- name: Ensure petclinic users exist and have privileges
  shell: |
    mysql -uroot -p"{{ mysql_root_password }}" << 'EOF'
    CREATE USER IF NOT EXISTS '{{ item.name }}'@'%' IDENTIFIED BY '{{ item.password }}';
    GRANT ALL PRIVILEGES ON *.* TO '{{ item.name }}'@'%';
    FLUSH PRIVILEGES;
    EOF
  loop: "{{ petclinic_users }}"
  changed_when: false

- name: Ensure /tmp/petclinic directory exists
  file:
    path: /tmp/petclinic
    state: directory
    mode: '0755'

- name: Copy SQL Schema files to remote host for execution
  copy:
    src: "{{ role_path }}/files/{{ item }}-schema.sql"
    dest: "/tmp/petclinic/{{ item }}-schema.sql"
    owner: root
    group: root
    mode: '0644'
  loop:
    - customers
    - visits
    - vets

- name: Load database schema
  shell: |
    mysql -uroot -p"{{ mysql_root_password }}" {{ item }} < /tmp/petclinic/{{ item }}-schema.sql
  loop:
    - customers
    - visits
    - vets
  changed_when: false
  ignore_errors: true

- name: Verify databases were created
  shell: |
    mysql -uroot -p"{{ mysql_root_password }}" -e "SHOW DATABASES LIKE '{{ item }}';" | grep -q "{{ item }}"
  loop: "{{ petclinic_databases }}"
  register: db_verify
  changed_when: false
  failed_when: false

- name: Display database setup summary
  debug:
    msg:
      - "======================================"
      - "MySQL Petclinic Setup Complete"
      - "======================================"
      - "Databases created: {{ petclinic_databases | join(', ') }}"
      - "Users created: {{ petclinic_users | map(attribute='name') | join(', ') }}"
      - "======================================"
