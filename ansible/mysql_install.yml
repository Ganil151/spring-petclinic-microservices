---
- name: Install & Configure MySQL 8 on Amazon Linux 2023
  hosts: mysql
  become: true
  
  vars:
    mysql_repo_url: "https://dev.mysql.com/get/mysql80-community-release-el9-1.noarch.rpm"
    mysql_repo_path: "/tmp/mysql80-community-release.rpm"


  tasks:

    - name: Install required dependencies
      yum:
        name:
          - python3-pip
          - wget  # <-- Ensure wget is present
          - perl
          - shadow-utils
        state: present

    # PyMySQL is not needed when using shell commands instead of community.mysql modules

    - name: Remove conflicting MariaDB packages (if any)
      yum:
        name:
          - mariadb*
        state: absent
      ignore_errors: yes

    # --- FIX START: Using shell command to bypass 403 Forbidden ---
    - name: Download and Install MySQL 8 repository RPM
      shell: |
        # Use wget to download the RPM to a temporary location
        wget -q -O {{ mysql_repo_path }} {{ mysql_repo_url }}
        # Use yum to install the local RPM file
        yum install -y {{ mysql_repo_path }}
      args:
        creates: /etc/yum.repos.d/mysql-community.repo
    # --- FIX END ---

    - name: Install MySQL 8 Community Server
      yum:
        name:
          - mysql-community-server
        state: present

    - name: Ensure MySQL service is started
      systemd:
        name: mysqld
        state: started
        enabled: yes

    - name: Wait for MySQL to be fully up
      wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 5
        timeout: 60
        state: started

    - name: Get temporary MySQL root password
      shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -n 1
      register: temp_pass
      changed_when: false
      failed_when: false

    - name: Check if root password is already set correctly
      shell: /usr/bin/mysql -u root -p"{{ mysql_root_password }}" -e "SELECT 1;" 2>/dev/null
      register: password_check
      changed_when: false
      failed_when: false

    - name: Check if temporary password works (if target password failed)
      shell: /usr/bin/mysql --connect-expired-password -u root -p"{{ temp_pass.stdout }}" -e "SELECT 1;" 2>/dev/null
      register: temp_pass_check
      when: 
        - password_check.rc != 0
        - temp_pass.stdout is defined
        - temp_pass.stdout | length > 0
      changed_when: false
      failed_when: false

    - name: Reset MySQL if authentication failed completely
      block:
        - name: Stop MySQL service (Reset)
          systemd:
            name: mysqld
            state: stopped
        
        - name: Wipe MySQL data directory (Reset)
          file:
            path: /var/lib/mysql
            state: absent

        - name: Start MySQL service (Reset)
          systemd:
            name: mysqld
            state: started

        - name: Wait for MySQL (Reset)
          wait_for:
            port: 3306
            delay: 5

        - name: Get new temporary password (Reset)
          shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -n 1
          register: reset_temp_pass

        - name: Set root password after reset
          shell: |
            /usr/bin/mysql --connect-expired-password -u root -p"{{ reset_temp_pass.stdout }}" \
            -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}';"
          register: reset_password_set
      when: 
        - password_check.rc != 0
        - (temp_pass_check.skipped is defined and temp_pass_check.skipped) or (temp_pass_check.rc is defined and temp_pass_check.rc != 0)

    - name: Set MySQL root password (if initial temp pass worked)
      shell: |
        /usr/bin/mysql --connect-expired-password -u root -p"{{ temp_pass.stdout }}" \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}';"
      when: 
        - password_check.rc != 0
        - temp_pass_check.rc is defined
        - temp_pass_check.rc == 0
      register: password_set

    - name: Create /root/.my.cnf for passwordless root login
      copy:
        dest: /root/.my.cnf
        content: |
          [client]
          user=root
          password={{ mysql_root_password }}
        owner: root
        group: root
        mode: '0600'
      when: password_check.rc == 0 or (password_set is defined and password_set.changed) or (reset_password_set is defined and reset_password_set.changed)

    - name: Verify MySQL authentication works
      shell: /usr/bin/mysql -e "SELECT 1;"
      register: auth_test
      changed_when: false



    - name: Configure MySQL bind-address
      lineinfile:
        path: /etc/my.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
        state: present
      notify: Restart MySQL

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysqld
        state: restarted
                                              