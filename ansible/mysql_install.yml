---
# Install the role first:
# ansible-galaxy install geerlingguy.mysql

- name: Setup MySQL using Ansible Galaxy Role
  hosts: mysql
  become: true
  
  vars:
    # MySQL root password
    mysql_root_password: "{{ mysql_root_password | default('Petclinic2025!') }}"
    mysql_root_password_update: yes
    
    # MySQL configuration
    mysql_enabled_on_startup: yes
    mysql_bind_address: '0.0.0.0'
    mysql_port: '3306'
    mysql_datadir: /var/lib/mysql
    mysql_socket: /var/lib/mysql/mysql.sock
    mysql_log_error: /var/log/mysqld.log
    mysql_pid_file: /var/run/mysqld/mysqld.pid
    
    # Character set
    mysql_character_set_server: utf8mb4
    mysql_collation_server: utf8mb4_unicode_ci
    
    # Performance settings
    mysql_max_connections: 200
    mysql_max_allowed_packet: '64M'
    mysql_innodb_buffer_pool_size: '1G'
    mysql_innodb_log_file_size: '256M'
    
    # Databases to create
    mysql_databases:
      - name: petclinic_customers
        collation: utf8mb4_unicode_ci
        encoding: utf8mb4
      - name: petclinic_visits
        collation: utf8mb4_unicode_ci
        encoding: utf8mb4
      - name: petclinic_vets
        collation: utf8mb4_unicode_ci
        encoding: utf8mb4
    
    # Users to create
    mysql_users:
      - name: petclinic
        host: '%'
        password: "{{ mysql_petclinic_password | default('Petclinic2025!') }}"
        priv: 'petclinic_%.*:ALL'
        state: present
    
    # Disable password validation for easier setup
    mysql_validate_password_policy: LOW
    mysql_validate_password_length: 8
  
  roles:
    - role: geerlingguy.mysql
      become: yes
  
  post_tasks:
    - name: Verify MySQL is running
      systemd:
        name: mysqld
        state: started
        enabled: yes
    
    - name: Wait for MySQL to be ready
      wait_for:
        port: 3306
        delay: 5
        timeout: 60
    
    - name: Test MySQL connection
      shell: mysql -u root -p'{{ mysql_root_password }}' -e "SELECT VERSION();"
      register: mysql_version
      changed_when: false
      no_log: true
    
    - name: Display MySQL version
      debug:
        msg: "{{ mysql_version.stdout_lines }}"
    
    - name: Verify databases exist
      shell: mysql -u root -p'{{ mysql_root_password }}' -e "SHOW DATABASES LIKE 'petclinic_%';"
      register: databases
      changed_when: false
      no_log: true
    
    - name: Display databases
      debug:
        msg: "{{ databases.stdout_lines }}"
    
    - name: Test petclinic user
      shell: mysql -u petclinic -p'{{ mysql_petclinic_password }}' -e "SELECT 1;"
      register: user_test
      changed_when: false
      no_log: true
    
    - name: Display success message
      debug:
        msg: |
          ✓ MySQL installed and configured
          ✓ Databases: petclinic_customers, petclinic_visits, petclinic_vets
          ✓ User: petclinic (remote access enabled)
          ✓ Bind address: 0.0.0.0:3306