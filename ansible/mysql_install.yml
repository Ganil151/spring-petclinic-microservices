---
- name: Install & Configure MySQL 8 on Amazon Linux 2023
  hosts: mysql
  become: true
  
  vars:
    mysql_repo_url: "https://repo.mysql.com/mysql80-community-release-el9.rpm"
    mysql_repo_path: "/tmp/mysql80-community-release.rpm"
    mysql_gpg_key: "https://repo.mysql.com/RPM-GPG-KEY-mysql-2023"

  tasks:

    - name: Install required dependencies
      yum:
        name:
          - curl
          - python3-pip
          - shadow-utils
        state: present

    - name: Import MySQL GPG key
      rpm_key:
        state: present
        key: "{{ mysql_gpg_key }}"

    - name: Download MySQL repo using curl
      shell: |
        curl -L "{{ mysql_repo_url }}" -o "{{ mysql_repo_path }}"
      args:
        creates: "{{ mysql_repo_path }}"

    - name: Install MySQL 8 repo
      yum:
        name: "{{ mysql_repo_path }}"
        state: present
        disable_gpg_check: yes

    - name: Install MySQL 8 Community Server
      yum:
        name: mysql-community-server
        state: present

    - name: Ensure MySQL service is started
      systemd:
        name: mysqld
        state: started
        enabled: yes

    - name: Wait for MySQL to be fully up
      wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 5
        timeout: 60
        state: started

    - name: Get temporary MySQL root password
      shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -n 1
      register: temp_pass
      changed_when: false
      failed_when: false

    - name: Check if root password is already set correctly
      shell: mysql -u root -p"{{ mysql_root_password }}" -e "SELECT 1;" 2>/dev/null
      register: password_check
      changed_when: false
      failed_when: false

    - name: Check if temporary password works (if target password failed)
      shell: mysql --connect-expired-password -u root -p"{{ temp_pass.stdout }}" -e "SELECT 1;" 2>/dev/null
      register: temp_pass_check
      when: 
        - password_check.rc != 0
        - temp_pass.stdout is defined
        - temp_pass.stdout | length > 0
      changed_when: false
      failed_when: false

    - name: Set MySQL root password (if initial temp pass worked)
      shell: |
        mysql --connect-expired-password -u root -p"{{ temp_pass.stdout }}" \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}';"
      when: 
        - password_check.rc != 0
        - temp_pass_check.rc is defined
        - temp_pass_check.rc == 0
      register: password_set

    - name: Create /root/.my.cnf for passwordless root login
      copy:
        dest: /root/.my.cnf
        content: |
          [client]
          user=root
          password="{{ mysql_root_password }}"
        owner: root
        group: root
        mode: '0600'
      when: password_check.rc == 0 or (password_set is defined and password_set.changed)

    - name: Verify MySQL authentication works
      shell: mysql -e "SELECT 1;"
      register: auth_test
      changed_when: false

    - name: Configure MySQL bind-address
      lineinfile:
        path: /etc/my.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
        state: present
      notify: Restart MySQL

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysqld
        state: restarted