---
- name: Install & Configure MySQL 8 on Amazon Linux 2023
  hosts: mysql
  become: true
  
  vars:
    # NOTE: It is better practice to use Ansible Vault for passwords in production
    mysql_root_password: "PetclinicRoot123!"
    mysql_database_name: "petclinic"
    mysql_user_name: "petclinic_user"
    mysql_user_password: "PetClinicUser@12345!"
    mysql_repo_url: "https://dev.mysql.com/get/mysql80-community-release-el9-1.noarch.rpm"
    mysql_repo_path: "/tmp/mysql80-community-release.rpm"

  tasks:

    - name: Install required dependencies
      yum:
        name:
          - python3-pip
          - wget  # <-- Ensure wget is present
          - perl
          - shadow-utils
        state: present

    # PyMySQL is not needed when using shell commands instead of community.mysql modules

    - name: Remove conflicting system MySQL packages (if any)
      yum:
        name:
          - mariadb*
          - mysql*
        state: absent
      ignore_errors: yes

    # --- FIX START: Using shell command to bypass 403 Forbidden ---
    - name: Download and Install MySQL 8 repository RPM
      shell: |
        # Use wget to download the RPM to a temporary location
        wget -q -O {{ mysql_repo_path }} {{ mysql_repo_url }}
        # Use yum to install the local RPM file
        yum install -y {{ mysql_repo_path }}
      args:
        creates: /etc/yum.repos.d/mysql-community.repo
    # --- FIX END ---

    - name: Install MySQL 8 Community Server
      yum:
        name:
          - mysql-community-server
        state: present

    - name: Ensure MySQL service is started
      systemd:
        name: mysqld
        state: started
        enabled: yes

    - name: Wait for MySQL to be fully up
      wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 5
        timeout: 60
        state: started

    - name: Get temporary MySQL root password
      shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}'
      register: temp_pass
      changed_when: false
      failed_when: false

    - name: Check if root password is already set
      shell: mysql -uroot -p"{{ mysql_root_password }}" -e "SELECT 1;" 2>/dev/null
      register: password_check
      changed_when: false
      failed_when: false

    - name: Set MySQL root password using temporary password
      shell: |
        mysql --connect-expired-password -uroot -p"{{ temp_pass.stdout }}" \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';"
      when: 
        - temp_pass.stdout is defined 
        - temp_pass.stdout | length > 0
        - password_check.rc != 0
      register: password_set
      failed_when: false

    - name: Create /root/.my.cnf for passwordless root login
      copy:
        dest: /root/.my.cnf
        content: |
          [client]
          user=root
          password={{ mysql_root_password }}
        owner: root
        group: root
        mode: '0600'

    - name: Verify MySQL authentication works
      shell: mysql -e "SELECT 1;"
      register: auth_test
      changed_when: false
      failed_when: auth_test.rc != 0

    - name: Create PetClinic Database
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS {{ mysql_database_name }};"
      changed_when: false

    - name: Create PetClinic MySQL user
      shell: |
        mysql -e "CREATE USER IF NOT EXISTS '{{ mysql_user_name }}'@'%' IDENTIFIED BY '{{ mysql_user_password }}';"
        mysql -e "GRANT ALL PRIVILEGES ON {{ mysql_database_name }}.* TO '{{ mysql_user_name }}'@'%';"
        mysql -e "FLUSH PRIVILEGES;"
      changed_when: false

    - name: Configure MySQL bind-address
      lineinfile:
        path: /etc/my.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
        state: present
      notify: Restart MySQL

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysqld
        state: restarted
                                              