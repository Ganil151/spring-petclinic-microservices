---
- name: Fully reset MySQL 8 on Amazon Linux 2023 (FIXED)
  hosts: mysql
  become: true

  vars:
    mysql_root_password: "PetMa3ter$3JH3!"

  tasks:

    - name: Stop MySQL
      systemd:
        name: mysqld
        state: stopped
      ignore_errors: yes

    - name: Kill leftover MySQL processes
      shell: pkill -9 mysqld || true

    - name: Remove MySQL data directory
      file:
        path: /var/lib/mysql
        state: absent

    - name: Remove old log (temporary password no longer valid)
      file:
        path: /var/log/mysqld.log
        state: absent

    - name: Recreate data directory
      file:
        path: /var/lib/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: "0755"

    - name: Ensure MySQL log file exists
      file:
        path: /var/log/mysqld.log
        state: touch
        owner: mysql
        group: mysql
        mode: "0640"

    - name: Fix permissions on /var/log for MySQL (Amazon Linux requirement)
      file:
        path: /var/log
        mode: "0755"

    - name: Fix SELinux context on MySQL log (even if SELinux disabled)
      command: restorecon -Rv /var/log/mysqld.log
      ignore_errors: yes

    - name: Initialize MySQL database properly
      shell: |
        mysqld --initialize --user=mysql --datadir=/var/lib/mysql --log-error=/var/log/mysqld.log
      register: init_out
      failed_when: init_out.rc != 0

    - debug:
        var: init_out.stdout_lines

    - name: Get new temporary root password
      shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}'
      register: temp_pass

    - debug:
        msg: "Temp password → {{ temp_pass.stdout }}"

    - name: Start MySQL
      systemd:
        name: mysqld
        state: started
        enabled: yes

    - name: Wait for MySQL
      wait_for:
        port: 3306
        delay: 3
        timeout: 40

    - name: Set NEW root password
      shell: |
        mysql --connect-expired-password \
        -uroot -p"{{ temp_pass.stdout }}" \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;"
      register: pass_change
      failed_when: pass_change.rc != 0

    - name: Create root .my.cnf
      copy:
        dest: /root/.my.cnf
        mode: "0600"
        content: |
          [client]
          user=root
          password="{{ mysql_root_password }}"

    - name: Test MySQL authentication
      shell: mysql -e "SELECT 1;"
      register: test_out
      changed_when: false

    - debug:
        var: test_out.stdout
