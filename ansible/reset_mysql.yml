---
- name: Reset and Reinstall MySQL 8 on Amazon Linux 2023
  hosts: mysql
  become: true
  
  tasks:
    - name: Display reset information
      debug:
        msg: |
          ==========================================
          Resetting MySQL
          ==========================================
          This will completely reinitialize MySQL
          ==========================================
    
    - name: Stop MySQL service
      systemd:
        name: mysqld
        state: stopped
      ignore_errors: yes
    
    - name: Kill any remaining MySQL processes
      shell: |
        pkill -9 mysqld || true
        pkill -9 mysqld_safe || true
      ignore_errors: yes
    
    - name: Wait for processes to stop
      wait_for:
        port: 3306
        state: stopped
        timeout: 30
      ignore_errors: yes
    
    - name: Remove MySQL data directory
      file:
        path: /var/lib/mysql
        state: absent
    
    - name: Remove .my.cnf files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /root/.my.cnf
        - /home/ec2-user/.my.cnf
      ignore_errors: yes
    
    - name: Recreate MySQL data directory
      file:
        path: /var/lib/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: '0755'
    
    - name: Start MySQL service (will auto-initialize)
      systemd:
        name: mysqld
        state: started
        enabled: yes
    
    - name: Wait for MySQL to be fully up
      wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 5
        timeout: 60
        state: started
    
    - name: Get temporary MySQL root password
      shell: grep 'temporary password' /var/log/mysqld.log | tail -1 | awk '{print $NF}'
      register: temp_pass
      changed_when: false
    
    - name: Set MySQL root password
      shell: |
        /usr/bin/mysql --connect-expired-password -uroot -p"{{ temp_pass.stdout }}" \
        -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;"
      register: password_change
      failed_when: password_change.rc != 0
      retries: 3
      delay: 2
      until: password_change.rc == 0
    
    - name: Debug - Verify password variable
      debug:
        msg: "Password variable length: {{ mysql_root_password | length }}"
    
    - name: Create /root/.my.cnf for passwordless root login
      copy:
        dest: /root/.my.cnf
        content: |
          [client]
          user=root
          password={{ mysql_root_password }}
        owner: root
        group: root
        mode: '0600'
    
    - name: Test MySQL authentication
      shell: /usr/bin/mysql -e "SELECT 1;"
      changed_when: false
    
    - name: Configure MySQL bind-address
      lineinfile:
        path: /etc/my.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
        state: present
      notify: Restart MySQL
  
  handlers:
    - name: Restart MySQL
      systemd:
        name: mysqld
        state: restarted