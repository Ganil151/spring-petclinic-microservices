---
# Common Infrastructure Setup Playbook
# Apply base configuration to all servers

- name: Common Server Setup
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Set Hostname
      hostname:
        name: "{{ inventory_hostname }}"
      tags: hostname

    - name: Update All Packages
      yum:
        name: '*'
        state: latest
        update_cache: yes
        allowerasing: yes
      tags: system_update
      ignore_errors: true

    - name: Install Common Packages
      yum:
        name: "{{ common_packages }}"
        state: present
      tags: packages

    - name: Configure Timezone
      timezone:
        name: "{{ timezone | default('America/New_York') }}"
      tags: timezone

    - name: Configure Kernel Parameters
      shell: |
        sysctl -w {{ item.key }}={{ item.value }}
        echo "{{ item.key }}={{ item.value }}" >> /etc/sysctl.d/99-custom.conf
      loop: "{{ sysctl_config | dict2items }}"
      args:
        creates: /etc/sysctl.d/99-custom.conf
      tags: sysctl
      when: sysctl_config is defined

    - name: Load Kernel Modules
      command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter
      ignore_errors: true
      changed_when: false
      tags: kernel_modules

    - name: Ensure Kernel Modules Load on Boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
      tags: kernel_modules

    - name: Configure SELinux
      command: setenforce 0
      when: ansible_selinux.status == 'enabled' and selinux_state | default('permissive') == 'permissive'
      ignore_errors: true
      changed_when: false
      tags: selinux

    - name: Set SELinux to Permissive in Config
      lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX={{ selinux_state | default("permissive") }}'
      tags: selinux

    - name: Install Firewalld
      yum:
        name: firewalld
        state: present
      when: firewalld_enabled | default(true)
      tags: firewall

    - name: Start and Enable Firewalld
      service:
        name: firewalld
        state: started
        enabled: yes
      when: firewalld_enabled | default(true)
      tags: firewall

    - name: Configure SSH Hardening
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login | default("no") }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication | default("no") }}' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries {{ ssh_max_auth_tries | default(3) }}' }
      notify: Restart SSHD
     tags: ssh

    - name: Create System Limits Configuration
      blockinfile:
        path: /etc/security/limits.conf
        block: |
          * soft nofile {{ max_open_files | default(65536) }}
          * hard nofile {{ max_open_files | default(65536) }}
          * soft nproc {{ max_user_processes | default(4096) }}
          * hard nproc {{ max_user_processes | default(4096) }}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - System Limits"
      tags: limits

    - name: Configure rsyslog
      service:
        name: rsyslog
        state: started
        enabled: yes
      when: rsyslog_enabled | default(true)
      tags: logging

    - name: Configure Chrony/NTP
      yum:
        name: chrony
        state: present
      when: ntp_enabled | default(true)
      tags: ntp

    - name: Start and Enable Chrony
      service:
        name: chronyd
        state: started
        enabled: yes
      when: ntp_enabled | default(true)
      tags: ntp

    - name: Display System Information
      debug:
        msg:
          - "Hostname: {{ ansible_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "IP Address: {{ ansible_default_ipv4.address }}"
          - "Memory: {{ ansible_memtotal_mb }} MB"
          - "CPUs: {{ ansible_processor_vcpus }}"
      tags: info

  handlers:
    - name: Restart SSHD
      service:
        name: sshd
        state: restarted
