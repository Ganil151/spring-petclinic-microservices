---
# Kubernetes Master Node Setup Playbook
# Sets up and initializes the K8s control plane

- name: Kubernetes Master Node Configuration
  hosts: k8s_master
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: Display Master Node Information
      debug:
        msg:
          - "=============================================="
          - "  Kubernetes Master Node Setup"
          - "=============================================="
          - "Target: {{ inventory_hostname }}"
          - "IP: {{ ansible_default_ipv4.address }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "=============================================="

    - name: Verify system requirements
      assert:
        that:
          - ansible_memtotal_mb >= 2048
          - ansible_processor_vcpus >= 2
        fail_msg: "Master node requires minimum 2GB RAM and 2 CPUs"
        success_msg: "System meets minimum requirements"

  tasks:
    # ========================================
    # Configure /etc/hosts for all K8s nodes
    # ========================================
    - name: Gather facts from all K8s nodes
      setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['kube_cluster'] }}"
      run_once: true

    - name: Configure /etc/hosts with all K8s nodes
      blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED K8S HOSTS"
        block: |
          {% for host in groups['kube_cluster'] %}
          {{ hostvars[host]['ansible_default_ipv4']['address'] }} {{ host }} {{ hostvars[host]['ansible_hostname'] }}
          {% endfor %}
        create: yes
        backup: yes

    - name: Verify /etc/hosts configuration
      command: cat /etc/hosts
      register: hosts_file
      changed_when: false

    - name: Display /etc/hosts
      debug:
        msg: "{{ hosts_file.stdout_lines }}"

    # ========================================
    # System Prerequisites
    # ========================================
    - name: Disable swap
      block:
        - name: Turn off swap
          command: swapoff -a
          changed_when: false

        - name: Remove swap from fstab
          lineinfile:
            path: /etc/fstab
            regexp: '^\s*[^#].*swap'
            state: absent
          
        - name: Verify swap is disabled
          command: free -h
          register: swap_status
          changed_when: false
          
        - name: Show swap status
          debug:
            msg: "{{ swap_status.stdout_lines }}"

    - name: Configure SELinux to permissive mode
      block:
        - name: Set SELinux to permissive
          command: setenforce 0
          ignore_errors: yes
          changed_when: false

        - name: Persist SELinux permissive mode
          lineinfile:
            path: /etc/selinux/config
            regexp: '^SELINUX='
            line: 'SELINUX=permissive'
      when: ansible_selinux.status == "enabled"

    - name: Stop and disable firewalld
      systemd:
        name: firewalld
        state: stopped
        enabled: no
      ignore_errors: yes  # Ignore if firewalld is not installed

    - name: Load kernel modules
      block:
        - name: Add required kernel modules
          copy:
            dest: /etc/modules-load.d/k8s.conf
            content: |
              overlay
              br_netfilter
            mode: '0644'

        - name: Load overlay module
          command: modprobe overlay
          changed_when: false

        - name: Load br_netfilter module
          command: modprobe br_netfilter
          changed_when: false

    - name: Configure sysctl parameters for Kubernetes
      block:
        - name: Set sysctl parameters
          copy:
            dest: /etc/sysctl.d/k8s.conf
            content: |
              net.bridge.bridge-nf-call-iptables  = 1
              net.bridge.bridge-nf-call-ip6tables = 1
              net.ipv4.ip_forward                 = 1
            mode: '0644'

        - name: Apply sysctl parameters
          command: sysctl --system
          changed_when: false

    # ========================================
    # Install Container Runtime (containerd)
    # ========================================
    - name: Install containerd
      block:
        - name: Install containerd package
          yum:
            name:
              - containerd
            state: present

        - name: Create containerd config directory
          file:
            path: /etc/containerd
            state: directory
            mode: '0755'

        - name: Generate default containerd config
          shell: containerd config default > /etc/containerd/config.toml
          args:
            creates: /etc/containerd/config.toml

        - name: Configure containerd to use systemd cgroup
          lineinfile:
            path: /etc/containerd/config.toml
            regexp: '^\s*SystemdCgroup\s*='
            line: '            SystemdCgroup = true'
            insertafter: '^\s*\[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options\]'

        - name: Start and enable containerd
          systemd:
            name: containerd
            state: started
            enabled: yes
            daemon_reload: yes

    # ========================================
    # Install Kubernetes Components
    # ========================================
    - name: Add Kubernetes repository
      yum_repository:
        name: kubernetes
        description: Kubernetes Repository
        baseurl: https://pkgs.k8s.io/core:/stable:/v1.31/rpm/
        enabled: yes
        gpgcheck: yes
        gpgkey: https://pkgs.k8s.io/core:/stable:/v1.31/rpm/repodata/repomd.xml.key
        exclude: kubelet kubeadm kubectl cri-tools kubernetes-cni

    - name: Check if Kubernetes is already installed
      command: kubectl version --client --short
      register: kubectl_installed
      failed_when: false
      changed_when: false

    - name: Install Kubernetes packages
      yum:
        name:
          - "kubelet-{{ k8s_version }}-0"
          - "kubeadm-{{ k8s_version }}-0"
          - "kubectl-{{ k8s_version }}-0"
        state: present
        disable_excludes: kubernetes
      when: kubectl_installed.rc != 0

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: yes

    # ========================================
    # Initialize Kubernetes Cluster
    # ========================================
    - name: Check if Kubernetes is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_init

    - name: Initialize Kubernetes cluster
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr | default('10.244.0.0/16') }}
        --service-cidr={{ service_cidr | default('10.96.0.0/12') }}
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
        --node-name={{ inventory_hostname }}
      register: kubeadm_init_output
      when: not kubeadm_init.stat.exists

    - name: Display kubeadm init output
      debug:
        msg: "{{ kubeadm_init_output.stdout_lines }}"
      when: kubeadm_init_output is defined and kubeadm_init_output.changed

    # ========================================
    # Configure kubectl for ec2-user
    # ========================================
    - name: Create .kube directory for ec2-user
      file:
        path: /home/ec2-user/.kube
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy kubeconfig to ec2-user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ec2-user/.kube/config
        remote_src: yes
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Configure kubectl for ec2-user
      file:
        path: /home/ec2-user/.kube/config
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    # ========================================
    # Install CNI Plugin (Calico)
    # ========================================
    - name: Download Calico manifest
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml
        dest: /tmp/calico.yaml
        mode: '0644'
      become_user: ec2-user

    - name: Apply Calico CNI
      command: kubectl apply -f /tmp/calico.yaml
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      become_user: ec2-user
      register: calico_result
      changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"

    # ========================================
    # Generate and Save Join Command
    # ========================================
    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Save join command to file
      copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/k8s_join_command.sh
        mode: '0755'

    - name: Display join command
      debug:
        msg:
          - "=============================================="
          - "  Kubernetes Master Setup Complete!"
          - "=============================================="
          - "Join command saved to: /tmp/k8s_join_command.sh"
          - ""
          - "{{ join_command.stdout }}"
          - "=============================================="

    # ========================================
    # Label master node with control-plane role
    # ========================================
    - name: Label master node
      command: >
        kubectl label node {{ inventory_hostname }}
        node-role.kubernetes.io/control-plane=
        --overwrite
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      become_user: ec2-user
      register: label_result
      changed_when: "'labeled' in label_result.stdout"
      failed_when: false

  post_tasks:
    - name: Wait for cluster to be ready
      command: kubectl get nodes
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      become_user: ec2-user
      register: nodes_status
      until: nodes_status.rc == 0
      retries: 10
      delay: 10
      changed_when: false

    - name: Display cluster status
      debug:
        msg: "{{ nodes_status.stdout_lines }}"

    - name: Verify system pods
      command: kubectl get pods -n kube-system
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config
      become_user: ec2-user
      register: system_pods
      changed_when: false

    - name: Display system pods
      debug:
        msg: "{{ system_pods.stdout_lines }}"

    - name: Final summary
      debug:
        msg:
          - "=============================================="
          - "  ✅ Kubernetes Master Setup Complete!"
          - "=============================================="
          - "Next steps:"
          - "  1. Run: ansible-playbook playbooks/k8s-workers.yml"
          - "  2. Or copy join command from /tmp/k8s_join_command.sh"
          - "  3. Verify with: kubectl get nodes"
          - "=============================================="
