---
- name: Setup MySQL for Spring Petclinic
  hosts: mysql
  become: yes
  vars:
    mysql_root_password: "PetclinicRootPass!"
    petclinic_db: "petclinic"
    petclinic_user: "petclinic"
    petclinic_password: "PetClinic@12345!"
    mysql_port: 3306
  tasks:
    - name: Install required MySQL Python modules
      ansible.builtin.package:
        name:
          - python3-PyMySQL
        state: present

    - name: Install MySQL server (RedHat)
      ansible.builtin.yum:
        name: mysql-server
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install MySQL server (Debian/Ubuntu)
      ansible.builtin.apt:
        name: mysql-server
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure MySQL service is running (RedHat)
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Ensure MySQL service is running (Debian/Ubuntu)
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: yes
      when: ansible_os_family == "Debian"

    # This task might fail on fresh installs using temporary passwords or socket auth.
    # We ignore errors here and proceed to the next tasks which enforce the password.
    - name: Attempt to set/update root password (initial setup)
      ansible.builtin.mysql_user:
        login_user: root
        login_password: '' # Attempt initial connection with empty or socket auth
        name: root
        password: "{{ mysql_root_password }}"
        host_all: yes
        priv: "*.*:ALL,GRANT"
      ignore_errors: yes # Ignore errors if initial connection fails

    - name: Remove anonymous MySQL users
      ansible.builtin.mysql_user:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: ''
        host_all: yes
        state: absent

    - name: Remove test database
      ansible.builtin.mysql_db:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: test
        state: absent

    - name: Create PetClinic database
      ansible.builtin.mysql_db:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: "{{ petclinic_db }}"
        state: present
        encoding: utf8mb4
    - name: Create PetClinic user and grant privileges
      ansible.builtin.mysql_user:
        login_user: root
        login_password: "{{ mysql_root_password }}"
        name: "{{ petclinic_user }}"
        password: "{{ petclinic_password }}"
        host: "%"
        priv: "{{ petclinic_db }}.*:ALL,GRANT" # Added GRANT option here
        state: present
    # --- Schema and Data Import Tasks (Corrected for single target path) ---

    - name: Apply Customer service schema
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-customers-service/src/main/resources/db/mysql/schema.sql

    - name: Apply Customer service seed data
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-customers-service/src/main/resources/db/mysql/data.sql

    - name: Apply Vets service schema
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-vets-service/src/main/resources/db/mysql/schema.sql

    - name: Apply Vets service seed data
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-vets-service/src/main/resources/db/mysql/data.sql

    - name: Apply Visits service schema
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-visits-service/src/main/resources/db/mysql/schema.sql

    - name: Apply Visits service seed data
      ansible.builtin.mysql_db:
        login_user: "{{ petclinic_user }}"
        login_password: "{{ petclinic_password }}"
        name: "{{ petclinic_db }}"
        state: import
        target: /home/ec2-user/workspace/spms-pipeline/spring-petclinic-visits-service/src/main/resources/db/mysql/data.sql
