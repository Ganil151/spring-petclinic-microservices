# ============================================================
# Spring Petclinic Microservices - Complete Deployment Manifest
# ============================================================
# This file contains all microservices deployments and services
# Deploy in the order specified to ensure proper startup sequence
# 
# Deployment Order:
# 1. Config Server (provides configuration to all services)
# 2. Discovery Server (Eureka - service registry)
# 3. Core Business Services (customers, vets, visits, genai)
# 4. API Gateway (routes external traffic)
# 5. Admin & Monitoring (admin-server, prometheus, grafana)
# ============================================================

# ============================================================
# 1. CONFIG SERVER - Centralized Configuration Management
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  labels:
    app: config-server
    tier: infrastructure
    component: configuration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
        tier: infrastructure
    spec:
      containers:
      - name: config-server
        image: springcommunity/spring-petclinic-config-server
        ports:
        - containerPort: 8888
          name: http
        env:
        - name: SPRING_CLOUD_CONFIG_SERVER_GIT_URI
          value: https://github.com/spring-petclinic/spring-petclinic-microservices-config
        - name: SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL
          value: main
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8888
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8888
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  type: ClusterIP
  selector:
    app: config-server
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
      name: http

---
# ============================================================
# 2. DISCOVERY SERVER - Eureka Service Registry
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  labels:
    app: discovery-server
    tier: infrastructure
    component: service-discovery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
        tier: infrastructure
    spec:
      containers:
      - name: discovery-server
        image: springcommunity/spring-petclinic-discovery-server
        ports:
        - containerPort: 8761
          name: http
        env:
        - name: SPRING_CONFIG_IMPORT
          value: "configserver:http://config-server:8888/"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8761
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8761
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  labels:
    app: discovery-server
spec:
  type: ClusterIP
  selector:
    app: discovery-server
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761
      name: http

---
