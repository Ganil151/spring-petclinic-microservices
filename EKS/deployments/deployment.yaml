# ============================================================
# 8. GENAI SERVICE - AI Chatbot (Optional)
# ============================================================
# NOTE: Requires genai-secrets to be created with OpenAI or Azure OpenAI credentials
# Create secret before deploying this service
apiVersion: v1
kind: Secret
metadata:
  name: genai-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "changeme"
  AZURE_OPENAI_KEY: "changeme"
  AZURE_OPENAI_ENDPOINT: "changeme"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
  labels:
    app: genai-service
    tier: business
    component: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-service
  template:
    metadata:
      labels:
        app: genai-service
        tier: business
    spec:
      containers:
      - name: genai-service
        image: springcommunity/spring-petclinic-genai-service
        ports:
        - containerPort: 8087
          name: http
        env:
        - name: SPRING_CONFIG_IMPORT
          value: "configserver:http://config-server:8888/"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://discovery-server:8761/eureka/"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: genai-secrets
              key: OPENAI_API_KEY
        - name: AZURE_OPENAI_KEY
          valueFrom:
            secretKeyRef:
              name: genai-secrets
              key: AZURE_OPENAI_KEY
        - name: AZURE_OPENAI_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: genai-secrets
              key: AZURE_OPENAI_ENDPOINT
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8087
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8087
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: genai-service
  labels:
    app: genai-service
spec:
  type: ClusterIP
  selector:
    app: genai-service
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087
      name: http

---
# ============================================================
# 9. PROMETHEUS - Metrics Collection
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus-server
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets: ['localhost:9090']

    - job_name: api-gateway
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['api-gateway:8080']

    - job_name: customers-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['customers-service:8081']

    - job_name: visits-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['visits-service:8082']

    - job_name: vets-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['vets-service:8083']

    - job_name: genai-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['genai-service:8087']

    - job_name: admin-server
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['admin-server:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-server
  labels:
    app: prometheus-server
    tier: monitoring
    component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
        tier: monitoring
    spec:
      containers:
      - name: prometheus-server
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-server
  labels:
    app: prometheus-server
spec:
  type: ClusterIP
  selector:
    app: prometheus-server
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      name: http

---
