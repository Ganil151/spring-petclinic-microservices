apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets: ['localhost:9090']

    - job_name: api-gateway
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['api-gateway:8080']

    - job_name: customers-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['customers-service:8081']

    - job_name: visits-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['visits-service:8082']

    - job_name: vets-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['vets-service:8083']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-server
  labels:
    app: prometheus-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
    spec:
      containers:
      - name: prometheus-server
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-server
spec:
  selector:
    app: prometheus-server
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
