apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-deployer
  namespace: default
  labels:
    app: webhook-receiver
    component: automation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: webhook-deployment-manager
  labels:
    app: webhook-receiver
rules:
  # Allow reading deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  
  # Allow updating deployments (for image updates)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  
  # Allow reading deployment status and rollout status
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  
  # Allow reading pods (for rollout verification)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Allow reading replicasets (for rollout verification)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: webhook-deployer-binding
  labels:
    app: webhook-receiver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: webhook-deployment-manager
subjects:
  - kind: ServiceAccount
    name: webhook-deployer
    namespace: default
